<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>편갈사</title>
		<link rel="stylesheet" href="./src/styles/main.css?v=20260617-2" />
	</head>
	<body>
		<main class="page">
			<section class="card" aria-live="polite">
				<div class="overlay">
					<header class="window-bar" aria-hidden="true">
						<div class="traffic-lights">
							<span class="dot dot-close"></span>
							<span class="dot dot-min"></span>
							<span class="dot dot-max"></span>
						</div>
						<p class="window-title">Mouse Catch - Mini Game</p>
					</header>

					<div class="headline">
						<h1>편의점 같이 갈래?</h1>
						<p id="message" class="message" aria-live="polite"></p>
					</div>
				</div>

				<div id="playground" class="playground">
					<button id="likeButton" class="btn btn-like" type="button">좋아~</button>
					<button id="dislikeButton" class="btn btn-dislike" type="button">싫은데??</button>
				</div>
			</section>
		</main>

		<script type="module" src="./src/scripts/main.js?v=20260617-2"></script>
	</body>
</html>
